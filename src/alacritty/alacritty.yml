font:
  size: 12
  normal:
    family: JetBrains Mono Nerd Font Mono
    style: Regular
  bold:
    family: JetBrains Mono Nerd Font Mono
    style: Bold
  italic:
    family: JetBrains Mono Nerd Font Mono
    style: Italic
  bold_italic:
    family: JetBrains Mono Nerd Font Mono
    style: Bold Italic

window:
  startup_mode: Windowed
  decorations: None
  title: "Terminal [Alacritty]"
  dynamic_padding: true
  padding:
    x: 5
    y: 5
  class:
    instance: Alacritty
    general: Alacritty

colors:
  primary:
    background: '0x282828'
    foreground: '0xebdbb2'
  normal:
    black:   '0x282828'
    red:     '0xcc241d'
    green:   '0x98971a'
    yellow:  '0xd79921'
    blue:    '0x458588'
    magenta: '0xb16286'
    cyan:    '0x689d6a'
    white:   '0xa89984'
  bright:
    black:   '0x928374'
    red:     '0xfb4934'
    green:   '0xb8bb26'
    yellow:  '0xfabd2f'
    blue:    '0x83a598'
    magenta: '0xd3869b'
    cyan:    '0x8ec07c'
    white:   '0xebdbb2'

env:
  TERM: xterm-256color

shell:
  program: /usr/bin/bash
