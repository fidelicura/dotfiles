backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
glx-swap-method = 2;
xrender-sync-fence = true;

active-opacity = 1;
inactive-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = false;
opacity-rule = [
    "85:class_g = 'Rofi'",
    "85:class_g = 'Alacritty' && focused",
    "85:class_g = 'Alacritty' && !focused",
    "85:class_g = 'Zathura' && focused",
    "85:class_g = 'Zathura' && !focused",
];

blur-background = true;
blur-method = "dual_kawase";
blur-strength = 7;

fading = true;
fade-delta = 4;
no-fading-openclose = false;
fade-exclude = [ ];

shadow = true;
shadow-radius = 15;
shadow-opacity = 2;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-ignore-shaped = false;
wintypes:
{
    dock = { shadow = true; };
    menu = { shadow = true; };
    normal = { shadow = true; };
    dialog = { shadow = true; };
    tooltip = { shadow = true; };
    toolbar = { shadow = true; };
    popup_menu = { shadow = true; };
};
